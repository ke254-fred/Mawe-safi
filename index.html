<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mawe Safi Cut Stones | Premium Kenyan Building Stones</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        /* Color Palette Constants */
        :root {
            --dark-green: #0b251a;
            --gold: #dfba6b;
            --gold-hover: #f1d48f;
            --light-bg: #f4f7f5;
            --white: #ffffff;
            --text-dark: #222222;
            --text-light: #666666;
        }

        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* Top Notification Bar */
        .top-bar {
            background-color: var(--gold);
            color: var(--dark-green);
            text-align: center;
            padding: 8px 10px;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Navigation Grid */
        header {
            background-color: var(--dark-green);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .logo-area h1 {
            color: var(--white);
            font-size: 1.6rem;
            letter-spacing: 1px;
        }

        .logo-area span {
            color: var(--gold);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        nav ul a {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav ul a:hover {
            color: var(--gold);
        }

        /* Hero Showcase Section */
        .hero {
            background: linear-gradient(rgba(11, 37, 26, 0.85), rgba(11, 37, 26, 0.9)), 
                        url('https://unsplash.com') no-repeat center center/cover;
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--white);
            padding: 0 20px;
        }

        .hero h2 {
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 1.4rem;
            margin-bottom: 30px;
            font-style: italic;
            max-width: 700px;
        }

        .btn-primary {
            background-color: var(--gold);
            color: var(--dark-green);
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-primary:hover {
            background-color: var(--gold-hover);
            transform: translateY(-2px);
        }

        /* Main Content Layout Sections */
        .section {
            padding: 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2.2rem;
            color: var(--dark-green);
            margin-bottom: 40px;
            position: relative;
            text-transform: uppercase;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background-color: var(--gold);
            margin: 10px auto 0;
        }

        /* Product & Services Grid Layout */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--white);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 5px solid var(--dark-green);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-top-color: var(--gold);
        }

        .card i {
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .card h3 {
            margin-bottom: 15px;
            color: var(--dark-green);
        }

        /* New Gallery Section Grid Layout */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            height: 250px;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(11, 37, 26, 0.9));
            color: var(--white);
            padding: 20px;
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Interactive Estimator App Feature */
        .calculator-box {
            background-color: var(--dark-green);
            color: var(--white);
            padding: 40px;
            border-radius: 8px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .calculator-box label {
            display: block;
            margin-bottom: 8px;
            color: var(--gold);
            font-weight: bold;
        }

        .calculator-box input, .calculator-box select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            background-color: white;
            color: var(--text-dark);
        }

        .calc-btn {
            background-color: var(--gold);
            color: var(--dark-green);
            width: 100%;
            padding: 12px;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .calc-btn:hover {
            background-color: var(--gold-hover);
        }

        .calc-result {
            margin-top: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--white);
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 4px;
            display: none;
        }

        /* Split Contact Layout Grid */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 50px;
        }

        .contact-info h3 {
            color: var(--dark-green);
            margin-bottom: 20px;
            font-size: 1.6rem;
        }

        .info-link-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .info-link-item i {
            color: var(--gold);
            font-size: 1.4rem;
            width: 25px;
        }

        .info-link-item a {
            color: var(--text-dark);
            text-decoration: none;
        }

        .info-link-item a:hover {
            text-decoration: underline;
        }

        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        /* Footer Utilities */
        footer {
            background-color: var(--dark-green);
            color: var(--white);
            text-align: center;
            padding: 30px 20px;
            margin-top: 40px;
            border-top: 4px solid var(--gold);
        }

        footer p {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Media Viewport Adjustments */
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 15px;
            }
            .hero h2 {
                font-size: 2.2rem;
            }
            .hero p {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
